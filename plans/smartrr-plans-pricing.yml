description: >-
  Smartrr is billed as a Shopify subscription app, not per API call. Pricing is
  a monthly base fee tied to a plan tier plus a usage fee of 1% of subscriber
  GMV (the gross merchandise value of all orders involving a subscription,
  including the first subscription order and every reorder attached to it).
  Smartrr markets a "no transaction fee" guarantee, meaning there is no
  additional per-order transaction fee beyond that 1% of subscriber GMV. There
  are three published tiers - Launch ($99/mo), Grow ($299/mo), and Excel
  (starting at $499/mo) - plus negotiated, flat-fee annual contracts with
  volume discounts for larger merchants. A 14-day free trial is offered.
  Contracts are month-to-month and can be cancelled at any time (billed through
  the end of the cancellation month). The Vendor API is included with a Smartrr
  subscription and has no separate API access fee.
notes: >-
  Monthly base fees and the 1% subscriber GMV rate were sourced from the Smartrr
  pricing page and third-party reviews as of the review date; verify current
  numbers on https://smartrr.com/pricing during reconciliation. Feature
  allocation across tiers is approximate.
sources:
- https://smartrr.com/pricing
- https://support.smartrr.com/hc/en-us/articles/38949730932753-Plans
