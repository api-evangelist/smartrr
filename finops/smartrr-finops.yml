principles:
- name: Visibility
  description: Track subscriber GMV monthly, since the 1% usage fee scales directly with it; watch the plan tier's fixed base fee separately.
- name: Allocation
  description: Attribute the base fee and GMV fee to the ecommerce/retention team that owns the subscription program.
- name: Optimization
  description: Right-size the plan tier to the feature set actually used, and negotiate a flat-fee annual contract once subscriber GMV is high enough that 1% exceeds a fixed contract.
- name: Accountability
  description: Review monthly Smartrr invoices against subscriber GMV growth and the retention/revenue the subscription program returns.
