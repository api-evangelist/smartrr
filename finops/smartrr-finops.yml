description: >-
  FinOps view of Smartrr spend. Smartrr is billed as a Shopify subscription app,
  not per API request - the Vendor API is included with a Smartrr subscription
  at no additional API fee. Cost is driven by two components: a fixed monthly
  base fee tied to the plan tier (Launch $99, Grow $299, Excel from $499) and a
  usage fee of 1% of subscriber GMV (the gross merchandise value of all orders
  attached to a subscription). Smartrr markets a no-transaction-fee guarantee,
  so there is no additional per-order fee beyond the 1% of subscriber GMV.
  Larger merchants can negotiate flat-fee annual contracts with volume
  discounts. Because the dominant variable cost scales with subscriber GMV,
  spend grows with subscription revenue rather than with API call volume.
notes: >-
  Per-tier base fees and the 1% subscriber GMV rate are not reconciled here;
  verify current numbers on https://smartrr.com/pricing. The relevant cost
  drivers are the plan tier and subscriber GMV, not API request counts.
