actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Smartrr's public API is
    request/response REST (the Vendor API), and its only server-push mechanism
    is outbound webhooks over HTTP. No AsyncAPI document was created because
    there is no server-push streaming transport on Smartrr's own API to model.
