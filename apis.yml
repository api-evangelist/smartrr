apis:
- aid: smartrr:smartrr-subscriptions-api
  name: Smartrr Subscriptions API
  tags:
  - Subscriptions
  - Purchase State
  - Recurring Revenue
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://api.smartrr.com/docs/redoc/
