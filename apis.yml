  - url: openapi/smartrr-openapi.yml
    type: OpenAPI
  - url: collections/smartrr.postman_collection.json
    type: PostmanCollection
  - url: collections/smartrr.opencollection.json
    type: OpenCollection
  description: >-
    Work with subscribers, which Smartrr models as customer relationships. List
    and retrieve customers by Smartrr or Shopify ID, read their payment methods
    and orders, import customers and payment methods from Shopify, fetch a
    customer's referral code and link, and add loyalty points.
