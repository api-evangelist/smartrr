    type: APIReference
  - url: openapi/smartrr-openapi.yml
    type: OpenAPI
  - url: collections/smartrr.postman_collection.json
    type: PostmanCollection
  - url: collections/smartrr.opencollection.json
    type: OpenCollection
  description: >-
    Read and manage the subscriptions customers hold, which Smartrr models as
    "purchase states". Create subscriptions, list them by organization,
    customer, or Shopify subscription ID, and drive the full lifecycle - skip,
    unskip, pause, activate, cancel, set the next billing date, change the
    selling plan, add or swap line items, and run bulk operations across many
    subscriptions.
- aid: smartrr:smartrr-subscribers-api
