aid: smartrr
url: https://raw.githubusercontent.com/api-evangelist/smartrr/refs/heads/main/apis.yml
name: Smartrr
kind: company
description: >-
  Smartrr is a subscription and loyalty platform for Shopify DTC brands. It adds
  subscribe-and-save subscriptions, a branded customer account portal, loyalty
  and rewards, referrals, bundles, and retention tooling on top of Shopify. Its
  Vendor API (https://api.smartrr.com) lets merchants programmatically manage
  the subscriptions their customers hold - modeled as "purchase states" - along
  with the subscribers, orders, bills, and the selling plans / subscription
  programs products are sold on. The API is authenticated with a per-organization
  access token generated in the Smartrr admin Integrations tab and sent in the
  x-smartrr-access-token header. A full OpenAPI document (116 operations) is
  served publicly at https://api.smartrr.com/docs/spec.json and rendered at
  https://api.smartrr.com/docs/redoc/.
